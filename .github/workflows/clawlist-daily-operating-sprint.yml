name: ClawList Daily Operating Sprint

on:
  schedule:
    # 09:30 Asia/Shanghai every day.
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: clawlist-daily-operating-sprint
  cancel-in-progress: false

jobs:
  create-daily-sprint:
    name: Create daily operating sprint issue
    runs-on: ubuntu-latest
    steps:
      - name: Create or reuse today's sprint issue
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const formatter = new Intl.DateTimeFormat('en-CA', {
              timeZone: 'Asia/Shanghai',
              year: 'numeric',
              month: '2-digit',
              day: '2-digit',
            });
            const today = formatter.format(new Date());
            const title = `ClawList Daily Operating Sprint - ${today}`;
            const labels = ['daily-operating-sprint', 'clawlist-growth'];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: label,
                  color: label === 'daily-operating-sprint' ? '111827' : '0f766e',
                  description:
                    label === 'daily-operating-sprint'
                      ? 'Daily ClawList operating workflow'
                      : 'Growth, SEO, editorial, and product quality work',
                });
              }
            }

            const existing = await github.rest.search.issuesAndPullRequests({
              q: `repo:${owner}/${repo} is:issue in:title "${title}"`,
              per_page: 1,
            });

            if (existing.data.total_count > 0) {
              core.info(`Sprint issue already exists: ${existing.data.items[0].html_url}`);
              return;
            }

            const body = [
              'Daily autonomous operating checklist for ClawList.',
              '',
              'Primary narrative: OpenClaw, autonomous agents, Claude Code, Codex workflows, and installable agent skills.',
              '',
              '## Today\'s Work',
              '',
              '- [ ] Index & Search: review sitemap, noindex rules, unindexed pages, high-impression low-CTR pages, and Search Console follow-up items.',
              '- [ ] Editorial: improve one OpenClaw / autonomous agent / Claude Code / Codex workflow page or topic hub module.',
              '- [ ] Homepage & Navigation: refresh top story, most-read signal, weekly brief archive, and key internal links if stronger candidates exist.',
              '- [ ] Skills Quality: strengthen 5-10 skills with outcomes, setup steps, caveats, alternatives, source links, and last-reviewed context.',
              '- [ ] Trust Cleanup: remove, redirect, or noindex mock pages, TODO flows, test pages, empty states, Chinese frontend copy, and thin directory surfaces.',
              '- [ ] Growth Loop: improve weekly brief, RSS, share tracking, CTA tracking, internal links, and repeat-visit paths.',
              '- [ ] Verification: run typecheck, targeted lint, and production build before shipping code.',
              '',
              '## Done Criteria',
              '',
              '- [ ] At least one meaningful improvement is ready to ship or clearly documented as blocked.',
              '- [ ] Any changed code has been verified with the appropriate checks.',
              '- [ ] The final update names shipped files, validation, and the next highest-leverage task.',
              '',
              'Generated by the scheduled ClawList Daily Operating Sprint automation.',
            ].join('\n');

            const issue = await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels,
            });

            core.info(`Created sprint issue: ${issue.data.html_url}`);
