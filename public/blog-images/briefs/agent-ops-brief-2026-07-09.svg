<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Agent telemetry control plane</title>
  <desc id="desc">A clean technical composition showing policy gates, browser validation, telemetry export, and review metrics around delegated agent work.</desc>
  <rect width="1600" height="900" fill="#07111d"/>
