<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Agent repository onboarding map</title>
  <desc id="desc">A clean technical diagram of a repository map connected to layered instructions, reusable skills, and three model routes.</desc>
  <rect width="1600" height="900" fill="#07111d"/>
  <defs>
    <linearGradient id="panel" x1="128" y1="94" x2="1472" y2="806" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset=".58" stop-color="#111827"/>
      <stop offset="1" stop-color="#171326"/>
    </linearGradient>
    <linearGradient id="route" x1="360" y1="450" x2="1270" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset=".55" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="wash" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(440 250) rotate(22) scale(620 330)">
      <stop stop-color="#38bdf8" stop-opacity=".16"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="34" y="20" width="1532" height="860" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="34" stdDeviation="52" flood-color="#020617" flood-opacity=".65"/>
    </filter>
  </defs>
  <rect x="108" y="84" width="1384" height="732" rx="32" fill="url(#panel)" stroke="#263244" stroke-width="2" filter="url(#shadow)"/>
  <rect x="108" y="84" width="1384" height="732" rx="32" fill="url(#wash)"/>
